<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>AusMatch — 호주 워홀 매칭</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Apple SD Gothic Neo','Noto Sans KR',sans-serif;
  min-height:100vh;min-height:100dvh;
  background:#ffffff;
  display:flex;justify-content:center;align-items:flex-start;
  overflow-x:hidden;
}
.app{width:100%;max-width:460px;min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;background:#fff}
.screen{display:none;flex-direction:column;min-height:100vh;min-height:100dvh}
.screen.active{display:flex;animation:fadeUp .28s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* ── LANG SCREEN ── */
#s-lang{align-items:center;justify-content:center;gap:32px;padding:48px 28px;background:#fff}
.mascot{font-size:68px;display:block;margin-bottom:12px;animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.logo-t{font-size:28px;font-weight:800;background:linear-gradient(135deg,#f472b6,#c084fc);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:6px}
.logo-s{color:#6b7280;font-size:13px;font-weight:500;line-height:1.5;text-align:center;max-width:220px;margin:0 auto}
.lang-card{border-radius:24px;padding:28px 24px;width:100%;background:#f9f9fb;border:1px solid #ede9fe}
.lang-card p{color:#6b5b95;font-size:14px;margin-bottom:20px;line-height:1.5;text-align:center}
.lang-btns{display:flex;flex-direction:column;gap:12px}
.lbtn{display:flex;align-items:center;justify-content:center;gap:10px;padding:17px;border-radius:16px;border:none;cursor:pointer;font-size:16px;font-weight:700;transition:all .2s;width:100%}
.lbtn-ko{background:linear-gradient(135deg,#f9a8d4,#f472b6);color:#fff;box-shadow:0 6px 18px rgba(244,114,182,.3)}
.lbtn-en{background:#fff;color:#7c3aed;border:2px solid #e9d5ff}
.lbtn:hover{transform:translateY(-2px)}
.lbtn:active{transform:translateY(0)}

/* ── INTRO SCREEN ── */
#s-intro{padding:0;background:#fff}
.intro-topbar{display:flex;align-items:center;padding:18px 20px 0}
.back-lang{background:none;border:none;color:#9ca3af;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:4px;padding:6px 0}
.back-lang:hover{color:#f472b6}
.intro-inner{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px 24px 40px}
.intro-card{border-radius:24px;padding:28px 24px;width:100%;background:#fdf8ff;border:1px solid #f3e8ff}
.intro-icon{font-size:48px;text-align:center;display:block;margin-bottom:14px}
.intro-card h2{font-size:20px;font-weight:800;color:#1e1b4b;text-align:center;line-height:1.45;margin-bottom:8px}
.intro-card p{color:#6b7280;font-size:13px;text-align:center;line-height:1.6;margin-bottom:20px}
.feats{display:flex;flex-direction:column;gap:9px;margin-bottom:24px}
.feat{display:flex;align-items:center;gap:12px;padding:11px 14px;background:#fff;border-radius:12px;border:1px solid #f3e8ff}
.feat-icon{font-size:18px;width:24px;text-align:center}
.feat-text{font-size:13px;color:#374151;font-weight:500}
.btn-main{width:100%;padding:17px;border:none;border-radius:14px;cursor:pointer;background:linear-gradient(135deg,#f9a8d4,#f472b6);color:#fff;font-size:16px;font-weight:700;box-shadow:0 6px 18px rgba(244,114,182,.3);transition:all .2s}
.btn-main:hover{transform:translateY(-2px);box-shadow:0 10px 24px rgba(244,114,182,.4)}
.btn-back{width:100%;padding:17px;border:1.5px solid #f3e8ff;border-radius:14px;cursor:pointer;background:#fff;color:#9ca3af;font-size:16px;font-weight:600;transition:all .2s;margin-top:32px}
.btn-back:hover{border-color:#f9a8d4;color:#f472b6;background:#fdf2f8}

/* ── QUIZ SCREEN ── */
#s-quiz{background:#fff}
.q-header{padding:20px 20px 14px;border-bottom:1px solid #f5f5f5}
.q-topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.icon-btn{width:36px;height:36px;border-radius:10px;border:1.5px solid #e5e7eb;cursor:pointer;background:#fff;color:#6b7280;font-size:15px;display:flex;align-items:center;justify-content:center;transition:all .18s}
.icon-btn:hover{border-color:#f9a8d4;color:#f472b6;background:#fdf2f8}
.q-lbl{font-size:13px;font-weight:600;color:#9ca3af}
.skip-btn{display:none}
.prog-track{height:4px;background:#f3f4f6;border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,#f9a8d4,#f472b6);border-radius:2px;transition:width .35s ease}

/* Quiz body: minimal top gap, card starts near progress bar */
.q-body{
  flex:1;
  padding:36px 24px 24px;
  display:flex;
  flex-direction:column;
  justify-content:flex-start;
  overflow:hidden;
}
/* Single card — identical style to intro card, but taller */
.q-card{
  border-radius:24px;
  border:1px solid #f3e8ff;
  background:#fdf8ff;
  padding:26px 20px 24px;
  display:flex;
  flex-direction:column;
  gap:20px;
}
/* Question sits at top of the card */
.q-text{
  font-size:17px;
  font-weight:700;
  color:#111827;
  line-height:1.5;
}
/* Separated answer buttons */
.opts{display:flex;flex-direction:column;gap:11px}
.opt-btn{
  display:flex;align-items:center;gap:14px;
  padding:20px 16px;
  border-radius:14px;
  border:1.5px solid #f0ecff;
  background:#fff;
  font-size:14px;font-weight:500;color:#374151;
  cursor:pointer;text-align:left;
  transition:all .16s;
  width:100%;
  -webkit-tap-highlight-color:transparent;
  -webkit-appearance:none;
}
/* hover: only real mouse hover on desktop */
@media(hover:hover){
  .opt-btn:hover{background:#fdf2f8;border-color:#f9a8d4;color:#be185d}
}
/* active: tap feedback on touch — clears the moment finger lifts */
.opt-btn:active{background:#fdf2f8;border-color:#f9a8d4;color:#be185d}
.opt-btn:focus{outline:none}
.opt-btn:focus:not(:focus-visible){background:#fff;border-color:#f0ecff;color:#374151}
.opt-e{font-size:20px;width:28px;text-align:center;flex-shrink:0}
.opt-t{flex:1}

/* ── RESULTS SCREEN ── */
#s-results{background:#fff;overflow-y:auto}
.res-hero{padding:44px 24px 20px;text-align:center;background:linear-gradient(180deg,#fdf2f8 0%,#fff 100%);border-bottom:1px solid #fce7f3}
.res-hero .trophy{font-size:48px;display:block;margin-bottom:10px}
.res-hero h2{font-size:21px;font-weight:800;color:#1e1b4b;margin-bottom:5px}
.res-hero p{color:#9ca3af;font-size:13px}
.res-body{padding:20px 18px 52px;display:flex;flex-direction:column;gap:14px}
.sec-lbl{font-size:15px;font-weight:800;color:#1f2937;padding:6px 2px;display:flex;align-items:center;gap:7px}
.pf-card{border-radius:18px;padding:16px 18px;background:#fdf8ff;border:1px solid #f3e8ff}
.card-title{font-size:13px;font-weight:700;color:#6b7280;margin-bottom:10px}
.tags{display:flex;flex-wrap:wrap;gap:7px}
.tag{padding:5px 13px;background:#fff;border:1px solid #fbcfe8;border-radius:20px;font-size:12px;font-weight:600;color:#be185d}
.r-card{border-radius:18px;padding:16px 18px;background:#fff;border:1px solid #f3f4f6;box-shadow:0 2px 12px rgba(0,0,0,.05)}
.city-item,.job-item{padding-bottom:18px;margin-bottom:18px;border-bottom:1px solid #f9fafb}
.city-item:last-child,.job-item:last-child{padding-bottom:0;margin-bottom:0;border-bottom:none}
.item-top{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.medal{font-size:20px;width:28px;text-align:center;flex-shrink:0}
.item-info{flex:1;min-width:0}
.item-name{font-size:15px;font-weight:700;color:#111827}
.item-sub{font-size:12px;color:#9ca3af;margin-top:3px}
.pct-col{text-align:right;flex-shrink:0}
.pct-num{font-size:17px;font-weight:800;color:#f472b6}
.bar-track{width:64px;height:4px;background:#f3f4f6;border-radius:2px;overflow:hidden;margin-top:4px;margin-left:auto}
.bar-fill{height:100%;background:linear-gradient(90deg,#f9a8d4,#f472b6);border-radius:2px;width:0;transition:width 1.2s ease}
.c-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px}
.c-tag{padding:3px 9px;background:#f5f3ff;border-radius:6px;font-size:11px;font-weight:600;color:#7c3aed}
.reason-txt{font-size:13px;color:#4b5563;line-height:1.7}
.wage-badge{display:inline-block;padding:3px 9px;background:#fdf2f8;border-radius:6px;font-size:11px;font-weight:600;color:#be185d;border:1px solid #fbcfe8}
.block-lbl{font-size:11px;font-weight:700;color:#c084fc;margin-bottom:4px;margin-top:10px;text-transform:uppercase;letter-spacing:.5px}
.prep-box{padding:11px 13px;background:#fafafa;border-radius:10px;border:1px solid #f3f4f6;margin-top:6px}
.prep-txt{font-size:12px;color:#4b5563;line-height:2;white-space:pre-line}
.restart-btn{width:100%;padding:17px;border:none;border-radius:14px;cursor:pointer;background:linear-gradient(135deg,#f9a8d4,#f472b6);color:#fff;font-size:15px;font-weight:700;box-shadow:0 6px 18px rgba(244,114,182,.25);transition:all .2s;margin-top:4px}
.restart-btn:hover{transform:translateY(-2px)}
</style>
</head>
<body>
<div class="app">

  <!-- ① 언어 선택 -->
  <div id="s-lang" class="screen active">
    <div style="text-align:center">
      <span class="mascot">🦘</span>
      <div class="logo-t">AusMatch</div>
      <div class="logo-s">나에게 잘 맞는 호주워홀 직종과 도시 찾기</div>
    </div>
    <div class="lang-card">
      <p>언어를 선택해 주세요<br>Please select your language</p>
      <div class="lang-btns">
        <button class="lbtn lbtn-ko" onclick="selectLang('ko')">🇰🇷 한국어로 시작하기</button>
        <button class="lbtn lbtn-en" onclick="selectLang('en')">🇦🇺 Start in English</button>
      </div>
    </div>
    <div style="color:#d1d5db;font-size:11px;font-weight:400;text-align:center;padding-bottom:8px">Made by @yoojin_jiny</div>
  </div>

  <!-- ② 인트로 -->
  <div id="s-intro" class="screen">
    <div class="intro-topbar">
      <button class="back-lang" id="back-lang-btn" onclick="show('s-lang')">← <span id="back-lang-txt"></span></button>
    </div>
    <div class="intro-inner">
      <div class="intro-card">

        <div class="feats" id="i-feats"></div>
        <button class="btn-main" id="i-btn" onclick="startQuiz()"></button>
      </div>
    </div>
  </div>

  <!-- ③ 퀴즈 -->
  <div id="s-quiz" class="screen">
    <div class="q-header">
      <div class="q-topbar">
        <div style="width:36px"></div>
        <span class="q-lbl" id="q-lbl"></span>
        <div style="width:36px"></div>
      </div>
      <div class="prog-track"><div class="prog-fill" id="prog-fill"></div></div>
    </div>
    <div class="q-body" id="q-body"></div>
  </div>

  <!-- ④ 결과 -->
  <div id="s-results" class="screen">
    <div class="res-hero">
      <span class="trophy">🎉</span>
      <h2 id="r-title"></h2>
      <p id="r-sub"></p>
    </div>
    <div class="res-body" id="r-body"></div>
  </div>

</div>

  const q=qs[qIdx];

  // One card — question at top, options below (mirrors intro card layout)
  const card=document.createElement('div'); card.className='q-card';

  const qt=document.createElement('div'); qt.className='q-text';
  qt.textContent=q.q; card.appendChild(qt);

  const od=document.createElement('div'); od.className='opts';
  q.opts.forEach(opt=>{
    const btn=document.createElement('button'); btn.className='opt-btn';
    btn.innerHTML=`<span class="opt-e">${opt.e}</span><span class="opt-t">${opt.t}</span>`;
    btn.onclick=()=>pick(opt); od.appendChild(btn);
  });
  card.appendChild(od);
  body.appendChild(card);

  // Back button below the card
  const backBtn=document.createElement('button'); backBtn.className='btn-back';
  backBtn.textContent=lang==='ko'?'← 뒤로가기':'← Go Back';
  backBtn.onclick=()=>goBack();
  body.appendChild(backBtn);
}

function pick(opt){
  if(document.activeElement) document.activeElement.blur();
  applyD(opt.d,1); hist.push({e:opt.e,t:opt.t,d:opt.d});
  qIdx++;
  // 딜레이: 터치 기기에서 :active/:hover 상태가 완전히 해제된 뒤 다음 화면 렌더
  setTimeout(()=>{ qIdx>=QS[lang].length?showResults():renderQ(); }, 80);
}
function skipQ(){
  hist.push({e:'⏭️',t:lang==='ko'?'건너뜀':'Skipped',d:{}});
  qIdx++; qIdx>=QS[lang].length?showResults():renderQ();
}
function goBack(){
  if(qIdx===0){show('s-intro');return;}
  qIdx--; const last=hist.pop(); applyD(last.d,-1); renderQ();
}

// ════════════════════════════════════════
// MATCHING
// ════════════════════════════════════════
const CW={urban:2,social:1.5,active:1.5,earning:1,english:1,adventure:1.5};
const JW={social:2,active:2.5,urban:1,earning:2,english:1.5,adventure:1};

function calcMatch(sc,w){
  let s=0,tot=0;
  for(const[d,wv]of Object.entries(w)){
    const u=P[d]??5, tv=sc[d]??5;
    s+=wv*(1-Math.abs(u-tv)/10); tot+=wv;
  }
  return Math.round(s/tot*100);
}

function normalize(arr){
  const mx=Math.max(...arr.map(x=>x.m));
  if(!mx)return;
  arr.forEach(x=>{x.m=Math.min(97,Math.round(x.m*90/mx));});
}

// ════════════════════════════════════════
// RESULTS
// ════════════════════════════════════════
function showResults(){
  const t=T[lang];
  $('r-title').textContent=t.rTitle; $('r-sub').textContent=t.rSub;

  const cities=CITIES.map(c=>({...c,m:calcMatch(c.sc,CW)})).sort((a,b)=>b.m-a.m);
  normalize(cities);
  const jobs=JOBS.map(j=>({...j,m:calcMatch(j.sc,JW)})).sort((a,b)=>b.m-a.m);
  normalize(jobs);
  savedCities=cities.slice(0,3); savedJobs=jobs.slice(0,3);

  const body=$('r-body'); body.innerHTML='';
  const medals=['🥇','🥈','🥉'];

  // Personality
  const pc=document.createElement('div'); pc.className='pf-card';
  pc.innerHTML=`<div class="card-title">${t.pfTitle}</div><div class="tags">${buildTags().map(tg=>`<span class="tag">${tg}</span>`).join('')}</div>`;
  body.appendChild(pc);

  // Cities
  const cl=document.createElement('div'); cl.className='sec-lbl'; cl.textContent=t.cityTitle; body.appendChild(cl);
  const cc=document.createElement('div'); cc.className='r-card';
  cities.slice(0,3).forEach((c,i)=>{
    const nm=lang==='ko'?c.nameKo:c.name;
    const div=document.createElement('div'); div.className='city-item';
    div.innerHTML=`
      <div class="item-top">
        <div class="medal">${medals[i]}</div>
        <div class="item-info"><div class="item-name">${c.emoji} ${nm}</div></div>
        <div class="pct-col">
          <div class="pct-num">${c.m}%</div>
          <div class="bar-track"><div class="bar-fill" data-w="${c.m}"></div></div>
        </div>
      </div>
      <div class="c-tags">${c.tags[lang].map(tg=>`<span class="c-tag">${tg}</span>`).join('')}</div>
      <div class="reason-txt">${c.reason[lang]}</div>`;
    cc.appendChild(div);
  });
  body.appendChild(cc);

  // Jobs
  const jl=document.createElement('div'); jl.className='sec-lbl'; jl.textContent=t.jobTitle; body.appendChild(jl);
  const jc=document.createElement('div'); jc.className='r-card';
  jobs.slice(0,3).forEach((j,i)=>{
    const nm=j.name[lang];
    const div=document.createElement('div'); div.className='job-item';
    div.innerHTML=`
      <div class="item-top">
        <div class="medal">${medals[i]}</div>
        <div class="item-info">
          <div class="item-name">${j.emoji} ${nm}</div>
          <div class="item-sub"><span class="wage-badge">💵 ${j.wage}</span></div>
        </div>
        <div class="pct-col">
          <div class="pct-num">${j.m}%</div>
          <div class="bar-track"><div class="bar-fill" data-w="${j.m}"></div></div>
        </div>
      </div>
      <div class="block-lbl">💬 ${t.whyLbl}</div>
      <div class="reason-txt">${j.reason[lang]}</div>
      <div class="prep-box">
        <div class="block-lbl">📋 ${t.prepLbl}</div>
        <div class="prep-txt">${j.prep[lang]}</div>
      </div>`;
    jc.appendChild(div);
  });
  body.appendChild(jc);

  const sb=document.createElement('button'); sb.className='restart-btn save-btn';
  sb.textContent=lang==='ko'?'결과 저장하기 📸':'Save Results 📸';
  sb.onclick=saveImages; body.appendChild(sb);

  const rb=document.createElement('button'); rb.className='restart-btn';
  rb.style.background='rgba(0,0,0,0)'; rb.style.color='#9ca3af';
  rb.style.border='1.5px solid #f3e8ff'; rb.style.boxShadow='none';
  rb.textContent=t.restart; rb.onclick=()=>show('s-lang'); body.appendChild(rb);

  show('s-results');
  requestAnimationFrame(()=>{
    setTimeout(()=>{
      document.querySelectorAll('.bar-fill').forEach(el=>{el.style.width=el.dataset.w+'%';});
    },120);
  });
}

// ════════════════════════════════════════
// IMAGE SAVE
// ════════════════════════════════════════
async function saveImages(){
  const btn=document.querySelector('.save-btn');
  const orig=btn.textContent;
  btn.textContent=lang==='ko'?'생성 중... ⏳':'Generating... ⏳';
  btn.disabled=true;
  try{
    const c1=await generateCanvas(buildCityCard());
    const c2=await generateCanvas(buildJobCard());
    const isMobile='ontouchstart' in window||navigator.maxTouchPoints>0;
    if(isMobile){
      showImageOverlay(c1,c2);
    } else {
      downloadCanvas(c1, lang==='ko'?'AusMatch_추천도시.png':'AusMatch_Cities.png');
      await new Promise(r=>setTimeout(r,500));
      downloadCanvas(c2, lang==='ko'?'AusMatch_추천직종.png':'AusMatch_Jobs.png');
    }
  }catch(e){
    alert(lang==='ko'?'오류가 발생했어요. 다시 시도해 주세요.':'An error occurred. Please try again.');
  }finally{
    btn.textContent=orig; btn.disabled=false;
  }
}

async function generateCanvas(el){
  document.body.appendChild(el);
  await new Promise(r=>requestAnimationFrame(()=>requestAnimationFrame(r)));
  const canvas=await html2canvas(el,{scale:2,useCORS:true,logging:false,backgroundColor:null});
  document.body.removeChild(el);
  return canvas;
}

function downloadCanvas(canvas,filename){
  const a=document.createElement('a');
  a.href=canvas.toDataURL('image/png'); a.download=filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
}

function showImageOverlay(c1,c2){
  const ko=lang==='ko';
  const ov=document.createElement('div');
  ov.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:9999;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:24px 16px 52px;box-sizing:border-box;';

  const topBar=document.createElement('div');
  topBar.style.cssText='display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:22px;';
  const closeId='ov-close-'+Date.now();
  topBar.innerHTML=`
    <div>
      <div style="color:#fff;font-size:15px;font-weight:700;margin-bottom:4px">${ko?'결과 이미지 저장':'Save Result Images'}</div>
      <div style="color:#c4b5fd;font-size:12px">${ko?'이미지를 길게 눌러 저장하세요 📲':'Long press an image to save 📲'}</div>
    </div>
    <button id="${closeId}" style="background:rgba(255,255,255,.15);border:none;color:#fff;font-size:14px;padding:9px 15px;border-radius:10px;cursor:pointer;flex-shrink:0;margin-left:12px">${ko?'닫기':'Close'}</button>
  `;
  ov.appendChild(topBar);

  [c1,c2].forEach((canvas,i)=>{
    const lbl=document.createElement('div');
    lbl.style.cssText='color:#f9a8d4;font-size:13px;font-weight:700;margin-bottom:8px;';
    lbl.textContent=ko?(i===0?'① 추천 도시 TOP 3':'② 추천 직종 TOP 3'):(i===0?'① Top 3 Cities':'② Top 3 Jobs');
    const img=document.createElement('img');
    img.src=canvas.toDataURL('image/png');
    img.style.cssText='width:100%;border-radius:14px;display:block;margin-bottom:20px;';
    ov.appendChild(lbl);
    ov.appendChild(img);
  });

  document.body.appendChild(ov);
  document.getElementById(closeId).onclick=()=>ov.remove();
}

function imgBase(content){
  const el=document.createElement('div');
  el.style.cssText='position:fixed;left:-9999px;top:0;width:390px;background:linear-gradient(160deg,#fdf8ff 0%,#f0e6ff 55%,#e4d0ff 100%);padding:52px 24px 64px;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;';
  const ko=lang==='ko';
  el.innerHTML=`
    <div style="text-align:center;margin-bottom:36px">
      <div style="font-size:54px;margin-bottom:10px">🦘</div>
      <div style="font-size:24px;font-weight:800;color:#f472b6;letter-spacing:-.5px">AusMatch</div>
      <div style="font-size:12px;color:#a78bfa;margin-top:6px;font-weight:500">${ko?'나의 워홀 매칭 결과':'My WHV Match Results'}</div>
    </div>
    ${content}
    <div style="text-align:center;margin-top:36px;font-size:11px;color:#c4b5fd;font-weight:500">Made with AusMatch</div>
  `;
  return el;
}

function buildCityCard(){
  const medals=['🥇','🥈','🥉']; const ko=lang==='ko';
  const rows=savedCities.map((c,i)=>`
    <div style="background:rgba(255,255,255,.88);border-radius:20px;padding:20px 18px;margin-bottom:13px;border:1px solid rgba(243,232,255,.9)">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:9px">
        <span style="font-size:22px">${medals[i]}</span>
        <span style="font-size:16px;font-weight:700;color:#111827;flex:1">${c.emoji} ${ko?c.nameKo:c.name}</span>
        <span style="font-size:20px;font-weight:800;color:#f472b6">${c.m}%</span>
      </div>
      <div style="height:5px;background:#f3f4f6;border-radius:3px;margin-bottom:10px;overflow:hidden">
        <div style="height:100%;width:${c.m}%;background:linear-gradient(90deg,#f9a8d4,#f472b6);border-radius:3px"></div>
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:9px">
        ${c.tags[lang].map(t=>`<span style="padding:3px 9px;background:#f5f3ff;border-radius:6px;font-size:11px;font-weight:600;color:#7c3aed">${t}</span>`).join('')}
      </div>
      <div style="font-size:12px;color:#4b5563;line-height:1.7">${c.reason[lang]}</div>
    </div>`).join('');
  return imgBase(`
    <div style="font-size:17px;font-weight:800;color:#1e1b4b;margin-bottom:16px">🏙️ ${ko?'추천 도시 TOP 3':'Top 3 Recommended Cities'}</div>
    ${rows}
  `);
}

function buildJobCard(){
  const medals=['🥇','🥈','🥉']; const ko=lang==='ko';
  const rows=savedJobs.map((j,i)=>`
    <div style="background:rgba(255,255,255,.88);border-radius:20px;padding:20px 18px;margin-bottom:13px;border:1px solid rgba(243,232,255,.9)">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:9px">
        <span style="font-size:22px">${medals[i]}</span>
        <div style="flex:1">
          <div style="font-size:16px;font-weight:700;color:#111827">${j.emoji} ${j.name[lang]}</div>
          <span style="display:inline-block;padding:3px 9px;background:#fdf2f8;border-radius:6px;font-size:11px;font-weight:600;color:#be185d;border:1px solid #fbcfe8;margin-top:4px">💵 ${j.wage}</span>
        </div>
        <span style="font-size:20px;font-weight:800;color:#f472b6">${j.m}%</span>
      </div>
      <div style="height:5px;background:#f3f4f6;border-radius:3px;margin-bottom:10px;overflow:hidden">
        <div style="height:100%;width:${j.m}%;background:linear-gradient(90deg,#f9a8d4,#f472b6);border-radius:3px"></div>
      </div>
      <div style="font-size:11px;font-weight:700;color:#c084fc;margin-bottom:4px">💬 ${ko?'왜 추천하나요?':'Why this pick?'}</div>
      <div style="font-size:12px;color:#4b5563;line-height:1.7;margin-bottom:10px">${j.reason[lang]}</div>
      <div style="background:#fafafa;border-radius:10px;border:1px solid #f0ecff;padding:12px 13px">
        <div style="font-size:11px;font-weight:700;color:#c084fc;margin-bottom:5px">📋 ${ko?'이렇게 준비하세요':'How to prepare'}</div>
        <div style="font-size:11px;color:#4b5563;line-height:2;white-space:pre-line">${j.prep[lang]}</div>
      </div>
    </div>`).join('');
  return imgBase(`
    <div style="font-size:17px;font-weight:800;color:#1e1b4b;margin-bottom:16px">💼 ${ko?'추천 직종 TOP 3':'Top 3 Recommended Jobs'}</div>
    ${rows}
  `);
}

function buildTags(){
  const ko=lang==='ko', tags=[];
  if(P.urban>=6)       tags.push(ko?'🏙️ 도시형':'🏙️ City Person');
  else if(P.urban<=4)  tags.push(ko?'🌿 자연형':'🌿 Nature Lover');
  if(P.social>=7)      tags.push(ko?'🤝 사교적':'🤝 Extrovert');
  else if(P.social<=3) tags.push(ko?'🎧 내향적':'🎧 Introvert');
  if(P.active>=7)      tags.push(ko?'💪 액티브':'💪 Active');
  else if(P.active<=3) tags.push(ko?'💻 데스크형':'💻 Desk Lover');
  if(P.earning>=7)     tags.push(ko?'💰 수익 중심':'💰 Money-Focused');
  else if(P.earning<=3) tags.push(ko?'✨ 경험 중심':'✨ Experience-Focused');
  if(P.adventure>=7)   tags.push(ko?'🏕️ 모험가':'🏕️ Adventurer');
  if(P.english>=7)     tags.push(ko?'🗣️ 영어 자신감':'🗣️ Confident English');
  else if(P.english<=3) tags.push(ko?'📖 영어 학습 중':'📖 Building English');
  if(!tags.length)     tags.push(ko?'🌏 자유로운 영혼':'🌏 Free Spirit');
  return tags;
}
